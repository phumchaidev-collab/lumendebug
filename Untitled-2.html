<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumenDebug | Multimodal Agentic Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-20">

    <header class="border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 bg-slate-900/90 z-50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <i data-lucide="zap" class="text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-tight">Lumen<span class="text-blue-400">Debug</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="apiStatus" class="hidden text-xs flex items-center gap-1 bg-green-500/10 text-green-400 px-2 py-1 rounded border border-green-500/20">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Connected
            </div>
            <button onclick="authorize()" id="authBtn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition-all">
                <i data-lucide="key" class="w-4 h-4"></i> Connect with Pollinations
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="lg:col-span-1 space-y-6">
            <div class="glass-card p-4 rounded-xl space-y-4">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="settings" class="w-4 h-4"></i> Global Settings
                </h2>
                
                <div>
                    <label class="block text-xs mb-1 text-slate-400">Modality</label>
                    <div class="grid grid-cols-3 gap-2 bg-slate-800 p-1 rounded-lg">
                        <button onclick="setModality('text')" id="mod-text" class="mod-btn bg-blue-600 text-xs py-1.5 rounded-md">Text</button>
                        <button onclick="setModality('image')" id="mod-image" class="mod-btn hover:bg-slate-700 text-xs py-1.5 rounded-md">Image</button>
                        <button onclick="setModality('audio')" id="mod-audio" class="mod-btn hover:bg-slate-700 text-xs py-1.5 rounded-md">Audio</button>
                    </div>
                </div>

                <div id="textOnlySettings">
                    <label class="block text-xs mb-1 text-slate-400">System Prompt</label>
                    <textarea id="systemPrompt" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none" placeholder="You are a helpful assistant..."></textarea>
                </div>

                <div>
                    <label class="block text-xs mb-1 text-slate-400">User Prompt / Content</label>
                    <textarea id="userPrompt" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Enter instructions here..."></textarea>
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs mb-1 text-slate-400">Seed</label>
                        <input type="number" id="seed" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm" value="42">
                    </div>
                    <div class="flex items-end pb-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="jsonMode" class="w-4 h-4 accent-blue-500">
                            <span class="text-xs text-slate-400">JSON Mode</span>
                        </label>
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="space-y-3">
                <select id="model1" class="model-select w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs"></select>
                <div id="res1" class="glass-card min-h-[400px] rounded-xl p-4 overflow-y-auto text-sm prose prose-invert max-w-none">
                    <div class="text-slate-500 italic">Standby...</div>
                </div>
            </div>
            <div class="space-y-3">
                <select id="model2" class="model-select w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs"></select>
                <div id="res2" class="glass-card min-h-[400px] rounded-xl p-4 overflow-y-auto text-sm prose prose-invert max-w-none">
                    <div class="text-slate-500 italic">Standby...</div>
                </div>
            </div>
            <div class="space-y-3">
                <select id="model3" class="model-select w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs"></select>
                <div id="res3" class="glass-card min-h-[400px] rounded-xl p-4 overflow-y-auto text-sm prose prose-invert max-w-none">
                    <div class="text-slate-500 italic">Standby...</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/80 backdrop-blur-md border-t border-slate-800 flex justify-center">
        <button onclick="executeAgent()" id="execBtn" class="bg-blue-600 hover:bg-blue-500 px-12 py-3 rounded-full font-bold flex items-center gap-3 transition-all shadow-lg shadow-blue-500/20 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            <i data-lucide="play" class="fill-current"></i> EXECUTE AGENT
        </button>
    </footer>

    <script>
        let currentModality = 'text';

        // --- BYOP Authentication ---
        const authorize = () => {
            const params = new URLSearchParams({
                redirect_url: window.location.href,
                app_key: 'pk_LumenDebug_01',
            });
            window.location.href = `https://enter.pollinations.ai/authorize?${params}`;
        };

        const handleAuthCallback = () => {
            const apiKey = new URLSearchParams(location.hash.slice(1)).get('api_key');
            if (apiKey) {
                localStorage.setItem('pollen_key', apiKey);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            const storedKey = localStorage.getItem('pollen_key');
            if (storedKey) {
                document.getElementById('authBtn').innerText = 'Switch Account';
                document.getElementById('apiStatus').classList.remove('hidden');
            }
        };

        // --- Modality Handling ---
        const setModality = (mode) => {
            currentModality = mode;
            document.querySelectorAll('.mod-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600');
                btn.classList.add('hover:bg-slate-700');
            });
            document.getElementById(`mod-${mode}`).classList.remove('hover:bg-slate-700');
            document.getElementById(`mod-${mode}`).classList.add('bg-blue-600');
            
            // Toggle system prompt visibility for image/audio
            document.getElementById('textOnlySettings').style.display = mode === 'text' ? 'block' : 'none';
        };

        // --- Model Management ---
        async function fetchModels() {
            try {
                const response = await fetch('https://gen.pollinations.ai/v1/models');
                const models = await response.json();
                const selectors = document.querySelectorAll('.model-select');
                
                selectors.forEach((select, idx) => {
                    select.innerHTML = models.map(m => `<option value="${m.name}" ${idx === 0 && m.name === 'openai' ? 'selected' : ''}>${m.description || m.name}</option>`).join('');
                });
            } catch (err) {
                console.error("Failed to fetch models", err);
            }
        }

        // --- Core Execution Logic ---
        async function executeAgent() {
            const key = localStorage.getItem('pollen_key');
            if (!key) return alert("Please connect your Pollinations account first!");

            const system = document.getElementById('systemPrompt').value;
            const prompt = document.getElementById('userPrompt').value;
            const seed = document.getElementById('seed').value;
            const jsonMode = document.getElementById('jsonMode').checked;
            const btn = document.getElementById('execBtn');

            // Save state
            localStorage.setItem('last_system', system);
            localStorage.setItem('last_user', prompt);

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 loader border-2 rounded-full"></div> WORKING...`;

            const tasks = [1, 2, 3].map(async (i) => {
                const model = document.getElementById(`model${i}`).value;
                const container = document.getElementById(`res${i}`);
                container.innerHTML = `<div class="flex items-center justify-center h-full"><div class="w-8 h-8 loader border-4 rounded-full"></div></div>`;

                try {
                    if (currentModality === 'text') {
                        const data = await fetchText(model, prompt, system, seed, jsonMode);
                        container.innerHTML = `<pre class="whitespace-pre-wrap">${data.choices[0].message.content}</pre>`;
                    } else if (currentModality === 'image') {
                        const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&model=${model}&nologo=true`;
                        container.innerHTML = `<img src="${imgUrl}" class="rounded-lg w-full shadow-xl" alt="Generated result" />`;
                    } else if (currentModality === 'audio') {
                        const audioUrl = `https://audio.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}`;
                        container.innerHTML = `
                            <div class="flex flex-col items-center gap-4">
                                <i data-lucide="music" class="w-12 h-12 text-blue-400"></i>
                                <audio controls src="${audioUrl}" class="w-full"></audio>
                                <p class="text-xs text-slate-500">Prompt: ${prompt}</p>
                            </div>`;
                        lucide.createIcons();
                    }
                } catch (err) {
                    container.innerHTML = `<div class="text-red-400">Error: ${err.message}</div>`;
                }
            });

            await Promise.all(tasks);
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="play" class="fill-current"></i> EXECUTE AGENT`;
            lucide.createIcons();
        }

        async function fetchText(model, prompt, system, seed, jsonMode) {
            const response = await fetch(`https://gen.pollinations.ai/v1/chat/completions`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('pollen_key')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: 'system', content: system },
                        { role: 'user', content: prompt }
                    ],
                    seed: parseInt(seed),
                    json: jsonMode
                })
            });
            if (!response.ok) throw new Error(await response.text());
            return response.json();
        }

        // --- Init ---
        window.onload = () => {
            handleAuthCallback();
            fetchModels();
            lucide.createIcons();

            // Restore prompts
            if (localStorage.getItem('last_system')) document.getElementById('systemPrompt').value = localStorage.getItem('last_system');
            if (localStorage.getItem('last_user')) document.getElementById('userPrompt').value = localStorage.getItem('last_user');
        };
    </script>
</body>
</html>
